name: Pipeline CI
on:
  push:
    branches:
      - main
    paths:
      - "data-pipelines/**"
  pull_request:
    paths:
      - "data-pipelines/**"
permissions:
  contents: read
jobs:
  checks:
    name: Pipeline CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13.x
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9"
          enable-cache: true
      - name: Install dependencies
        run: |
          uv venv
          uv pip install \
            -r dev-requirements.txt \
            -r data-pipelines/requirements-pipeline.txt
      - name: Run pipeline tests
        run: uv run pytest data-pipelines/test_pipeline_calculations.py
